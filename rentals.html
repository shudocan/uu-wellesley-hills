<!DOCTYPE html>
<html lang="en" data-skin="classic">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () { try {
      var t = localStorage.getItem('uuwh-theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      var s = localStorage.getItem('uuwh-skin'); if (['classic','modern','seasonal'].indexOf(s) === -1) s = 'classic';
      var e = document.documentElement; e.setAttribute('data-theme', t); e.setAttribute('data-skin', s);
    } catch (_) {} })();
  </script>
  <title>Rent Our Space — UU Wellesley Hills</title>
  <meta name="description" content="Rent the Sanctuary, Chapel, or Multipurpose Room at UU Wellesley Hills for weddings, concerts, classes, and meetings.">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script defer src="assets/js/render.js"></script>
  <script defer src="assets/js/site.js"></script>
</head>
<body data-page="rentals">
  <div data-include="partials/header.html"></div>
  <main id="main">

    <section class="section section--tint">
      <div class="container prose" data-reveal>
        <p class="eyebrow" data-bind="header.eyebrow">Rentals</p>
        <h1 data-bind="header.title">Rent Our Space</h1>
        <p class="lead" data-bind="header.lead">Available for your event.</p>
        <p data-bind="intro">Past uses of our spaces.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 data-reveal data-bind="spaces.heading">Available Spaces</h2>
        <div class="grid grid--3" data-list="spaces.items" data-stagger style="margin-top:1.5rem">
          <template>
            <article class="card" data-reveal>
              <div class="card__media"><img data-bind-src="image" src="" alt="" onerror="this.closest('.card__media').style.display='none'"></div>
              <h3 data-bind="title">Space</h3>
              <p><span class="badge" data-bind="capacity">Capacity</span></p>
              <p class="muted" data-bind="text">Description</p>
            </article>
          </template>
        </div>
        <p class="muted" style="margin-top:1.5rem"><span data-bind="policiesText">Review our policies.</span> <a data-bind-href="policiesHref" href="#" target="_blank" rel="noopener">Facilities Usage Policies (PDF)</a></p>
      </div>
    </section>

    <section class="section section--tint">
      <div class="container prose center" data-reveal>
        <h2 data-bind="cta.heading">Ready to inquire?</h2>
        <p class="lead" data-bind="cta.text">Tell us about your event.</p>
        <a class="btn btn--primary" data-bind="cta.buttonText" data-bind-href="cta.buttonHref" href="#">Start a Rental Inquiry</a>
      </div>
    </section>

  </main>
  <div data-include="partials/footer.html"></div>
</body>
</html>
