<!DOCTYPE html>
<html lang="en" data-skin="classic">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () { try {
      var t = localStorage.getItem('uuwh-theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      var s = localStorage.getItem('uuwh-skin'); if (['classic','modern','seasonal'].indexOf(s) === -1) s = 'classic';
      var e = document.documentElement; e.setAttribute('data-theme', t); e.setAttribute('data-skin', s);
    } catch (_) {} })();
  </script>
  <title>Contact Us — UU Wellesley Hills</title>
  <meta name="description" content="Contact UU Wellesley Hills: address, phone, email, office hours, staff contacts, and directions to 309 Washington Street.">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script defer src="assets/js/render.js"></script>
  <script defer src="assets/js/site.js"></script>
</head>
<body data-page="contact">
  <div data-include="partials/header.html"></div>
  <main id="main">

    <section class="section section--tint">
      <div class="container prose" data-reveal>
        <p class="eyebrow" data-bind="header.eyebrow">About &amp; Visitors</p>
        <h1 data-bind="header.title">Contact Us</h1>
        <p class="lead" data-bind="header.lead">We'd love to hear from you.</p>
      </div>
    </section>

    <section class="section">
      <div class="container grid grid--2">
        <div data-reveal="left">
          <h2>Get in Touch</h2>
          <p>
            <strong data-bind="site:contact.address1">309 Washington Street</strong><br>
            <span data-bind="site:contact.address2">Wellesley Hills, MA 02481</span>
          </p>
          <p>
            Phone: <a data-bind-href="site:contact.phoneLink" data-bind="site:contact.phone" href="#">781-235-7423</a><br>
            Email: <a data-bind-href="site:contact.emailLink" data-bind="site:contact.email" href="#">info@uuwellesley.org</a>
          </p>
          <h3>Office Hours</h3>
          <ul class="list-plain" data-list="site:officeHours">
            <template><li data-bind="">Hours</li></template>
          </ul>
          <p class="muted" data-bind="directions" style="margin-top:1rem">Directions.</p>
        </div>
        <div class="embed" style="aspect-ratio:4/3" data-reveal="right">
          <iframe data-bind-src="mapEmbed" src="" title="Map to UU Wellesley Hills" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </section>

    <section class="section section--tint">
      <div class="container">
        <h2 data-reveal data-bind="staff.heading">Who to Contact</h2>
        <div class="grid grid--2" data-list="staff.people" data-stagger style="margin-top:1.5rem">
          <template>
            <div class="card" data-reveal>
              <h3 data-bind="role">Role</h3>
              <p class="muted" data-bind="email">email</p>
            </div>
          </template>
        </div>
      </div>
    </section>

  </main>
  <div data-include="partials/footer.html"></div>
</body>
</html>
