<!DOCTYPE html>
<html lang="en" data-skin="classic">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () { try {
      var t = localStorage.getItem('uuwh-theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      var s = localStorage.getItem('uuwh-skin'); if (['classic','modern','seasonal'].indexOf(s) === -1) s = 'classic';
      var e = document.documentElement; e.setAttribute('data-theme', t); e.setAttribute('data-skin', s);
    } catch (_) {} })();
  </script>
  <title>Engage &amp; Connect — UU Wellesley Hills</title>
  <meta name="description" content="Ways to get involved at UU Wellesley Hills: social justice, caring team, small groups, religious education, music, and volunteering.">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script defer src="assets/js/render.js"></script>
  <script defer src="assets/js/site.js"></script>
</head>
<body data-page="engage">
  <div data-include="partials/header.html"></div>
  <main id="main">

    <section class="section section--tint">
      <div class="container prose" data-reveal>
        <p class="eyebrow" data-bind="header.eyebrow">About &amp; Visitors</p>
        <h1 data-bind="header.title">Engage &amp; Connect</h1>
        <p class="lead" data-bind="header.lead">Many ways to belong.</p>
        <p data-bind="intro">Get involved.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 data-reveal data-bind="ways.heading">Ways to Get Involved</h2>
        <div class="grid grid--3" data-list="ways.items" data-stagger style="margin-top:1.5rem">
          <template>
            <div class="card" data-reveal>
              <h3 data-bind="title">Way</h3>
              <p class="muted" data-bind="text">Description</p>
            </div>
          </template>
        </div>
      </div>
    </section>

    <section class="section section--tint">
      <div class="container prose center" data-reveal>
        <h2 data-bind="cta.heading">Ready to connect?</h2>
        <p class="lead" data-bind="cta.text">Reach out.</p>
        <a class="btn btn--primary" data-bind="cta.buttonText" data-bind-href="cta.buttonHref" href="#">Contact Us</a>
      </div>
    </section>

  </main>
  <div data-include="partials/footer.html"></div>
</body>
</html>
