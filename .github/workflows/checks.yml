name: Site checks

# Lightweight guardrails for developer/PR changes (the office editor's
# direct publishes skip PRs by design). Validates JSON and HTML.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON data files
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in data/**/*.json; do
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON"; fail=1
            else
              echo "ok: $f"
            fi
          done
          exit $fail

      - name: HTML sanity (HTMLHint)
        run: |
          npm i -g htmlhint@^1
          htmlhint "**/*.html" --ignore "node_modules/**" || true
